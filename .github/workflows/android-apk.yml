name: Build Android APK

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@f0282184c7ce73ab54c7e4ab5a617122602e575f

      - name: Set up Java
        uses: actions/setup-java@f300429fbae3ca8301ae4298bab87487a45ee00d
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@4cab68ce0f1c7c924f688bff4792e044f1aeb30c
        with:
          flutter-version: 3.27.4
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Build APK (release)
        if: github.event_name != 'pull_request'
        run: flutter build apk --release

      - name: Build App Bundle (release)
        if: github.event_name != 'pull_request'
        run: flutter build appbundle --release

      - name: Upload APK (debug)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pintdex-debug-apk
          path: build/app/outputs/flutter-apk/*.apk

      - name: Upload APK (release)
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pintdex-release-apk
          path: build/app/outputs/flutter-apk/*.apk

      - name: Upload AAB (release)
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pintdex-release-aab
          path: build/app/outputs/bundle/release/*.aab

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@9ed3cf9a6863b31f005d951c8d19de20628cf4eb
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
